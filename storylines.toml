# Perfect Run - Storyline Definitions
#
# Each [[storyline]] entry defines a storyline that can be toggled in the overlay.
# The hooks describe what the BG3SE mod should intercept when a storyline is disabled.
#
# Hook types:
#   block_flag       - Clear a flag whenever it gets set (needs guid)
#   block_dialog     - Stop a dialog when it starts (needs pattern)
#   block_quest      - Close a quest when it unlocks (needs quest_id)
#   clear_flag_on_event - Clear a flag when another event fires
#   custom_lua       - Run arbitrary Lua code
#
# Flag GUIDs must be discovered from unpacked game files using:
#   perfect-run search-flags <pattern>
#
# To unpack game files, use LSLib (Norbyte's tools):
#   1. Download from https://github.com/Norbyte/lslib/releases
#   2. Use ConverterApp.exe to unpack Gustav.pak
#   3. Use story tools to decompile story.div.osi

